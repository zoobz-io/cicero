services:
  # =============================================================================
  # Core Infrastructure
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cicero
      POSTGRES_USER: cicero
      POSTGRES_PASSWORD: cicero
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cicero"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=cicero password=cicero dbname=cicero sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations

  # =============================================================================
  # Translation
  # =============================================================================

  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      LT_LOAD_ONLY: "en,es,fr,de,pt,it,nl,pl,ru,zh,ja,ko"
      LT_DISABLE_WEB_UI: "true"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/languages"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s

  # =============================================================================
  # Observability
  # =============================================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./tools/dev/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

  # =============================================================================
  # Application
  # =============================================================================

  app:
    build:
      context: .
      dockerfile: tools/dev/Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      libretranslate:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      APP_DB_HOST: postgres
      APP_DB_PORT: "5432"
      APP_DB_NAME: cicero
      APP_DB_USER: cicero
      APP_DB_PASSWORD: cicero
      APP_DB_SSLMODE: disable
      APP_REDIS_ADDR: "redis:6379"
      APP_LIBRETRANSLATE_ADDR: "http://libretranslate:5000"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: cicero
    ports:
      - "8080:8080"
    volumes:
      - .:/app

volumes:
  pgdata:
